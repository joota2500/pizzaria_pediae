<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finalizar Pedido | PeçaPizzaOnline</title>

<meta name="description" content="Finalize seu pedido de pizza de forma rápida e segura.">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/pedido.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<main class="container py-5">

<div class="row justify-content-center">

<div class="col-lg-10">

<header class="text-center mb-4">

<h2 class="fw-bold">Finalizar Pedido</h2>

<a href="index.html#cardapio" class="voltarCardapio">
← Voltar ao cardápio
</a>

<div class="tempoEntrega mt-2">

<span class="badge bg-success fs-6">
🚚 Entrega estimada: 30–50 minutos
</span>

</div>

<p class="avisoEntrega mt-2 text-muted">
Entregamos apenas para os bairros listados
</p>

</header>

<div id="alertContainer"></div>

<div class="row g-4">

<!-- FORMULÁRIO -->

<section class="col-lg-7">

<div class="card shadow-sm">

<div class="card-body">

<h5 class="mb-3">📋 Dados do Cliente</h5>

<div class="mb-2">
<input type="text" id="nome" class="form-control" placeholder="👤 Seu nome">
<div class="invalid-feedback">Informe seu nome</div>
</div>

<div class="mb-2">
<input type="tel" id="telefone" class="form-control" placeholder="📞 Telefone">
<div class="invalid-feedback">Telefone inválido</div>
</div>

<div class="mb-2">
<input type="text" id="endereco" class="form-control" placeholder="📍 Endereço completo">
<div class="invalid-feedback">Informe o endereço</div>
</div>

<div class="mb-2">
<select id="bairro" class="form-select">
<option value="">Selecione seu bairro</option>
</select>
<div class="invalid-feedback">Selecione o bairro</div>
</div>

<!-- CUPOM -->

<div class="input-group mt-3">

<input type="text" id="cupom" class="form-control" placeholder="🎟 Cupom de desconto">

<button class="btn btn-warning" onclick="aplicarCupom()">
Aplicar
</button>

</div>

<!-- PAGAMENTO -->

<select id="pagamento" class="form-select mt-3">

<option value="">Forma de pagamento</option>

<option value="dinheiro">Dinheiro</option>
<option value="pix">Pix</option>
<option value="cartao">Cartão</option>
<option value="entrega">Pagar na entrega</option>

</select>

<div class="invalid-feedback d-block" id="erroPagamento"></div>

<!-- TROCO -->

<div id="areaTroco" class="mt-2" style="display:none">

<input type="text" id="troco" class="form-control" placeholder="Troco para quanto?">

</div>

<textarea id="obsFinal" class="form-control mt-3" rows="3" placeholder="📝 Observação do pedido"></textarea>

<button class="btn btn-success w-100 mt-4 d-flex align-items-center justify-content-center gap-2"
id="btnEnviar"
onclick="confirmarEnvio()">

<span id="textoBotao">FINALIZAR PEDIDO NO WHATSAPP</span>

<span id="loader" class="spinner-border spinner-border-sm" style="display:none"></span>

</button>

</div>

</div>

</section>

<!-- RESUMO -->

<section class="col-lg-5">

<div class="card shadow-sm resumoPedido">

<div class="card-body">

<h5 class="mb-3">🍕 Seu Pedido</h5>

<div id="pizzaResumo"></div>

<div id="bebidaResumo" class="mt-2"></div>

<hr>

<p id="subtotalResumo"></p>

<p id="cupomResumo"></p>

<p id="taxaEntrega">Entrega: R$ 0</p>

<hr>

<p class="fs-5 fw-bold text-danger" id="totalResumo"></p>

</div>

</div>

</section>

</div>

</div>

</div>

</main>

<footer id="contato" class="text-center py-3">

<p>
©️ 2026 PeçaPizzaOnline -
<a href="https://github.com/joota2500" target="_blank">
DevJoota2500
</a>
</p>

</footer>

<div class="toast-container position-fixed bottom-0 end-0 p-3"></div>

<script src="js/config.js"></script>
<script src="js/entrega.js"></script>
<script src="js/cupom.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

const pedido = JSON.parse(localStorage.getItem("pedido")) || []

if(pedido.length === 0){

alert("Nenhum pedido encontrado")
window.location.href="index.html"

}

function sanitizar(texto){

return String(texto)
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")

}

function moeda(valor){

return valor.toLocaleString("pt-BR",{
style:"currency",
currency:"BRL"
})

}

let pizzasHTML = []
let bebidasHTML = []
let subtotal = 0

pedido.forEach(item => {

const qtd = item.qtd || 1
subtotal += item.preco * qtd

if(item.tipo === "pizza"){

let nomePizza = sanitizar(item.nome)

if(item.nome2){
nomePizza = sanitizar(item.nome) + " / " + sanitizar(item.nome2)
}

let bordaTexto = ""

if(item.borda && item.borda !== "Sem borda"){
bordaTexto = `<div class="text-muted small">🧀 Borda: ${sanitizar(item.borda)}</div>`
}

pizzasHTML.push(`

<div class="border rounded p-2 mb-2 bg-light">

<div class="fw-semibold">
🍕 ${nomePizza} (${sanitizar(item.tamanho)})
</div>

${bordaTexto}

<div class="small">
Qtd: ${qtd}
</div>

<div class="text-end fw-semibold">
${moeda(item.preco * qtd)}
</div>

</div>

`)
}

if(item.tipo === "bebida"){

bebidasHTML.push(`

<div class="border rounded p-2 mb-2 bg-light">

<div class="fw-semibold">
🥤 ${sanitizar(item.nome)}
</div>

<div class="small">
Qtd: ${qtd}
</div>

<div class="text-end fw-semibold">
${moeda(item.preco * qtd)}
</div>

</div>

`)
}

})

document.getElementById("pizzaResumo").innerHTML =
pizzasHTML.length ? pizzasHTML.join("") : `<div class="text-muted">Nenhuma pizza</div>`

document.getElementById("bebidaResumo").innerHTML =
bebidasHTML.length ? bebidasHTML.join("") : `<div class="text-muted">Nenhuma bebida</div>`

document.getElementById("subtotalResumo").innerText =
"Subtotal: " + moeda(subtotal)

document.getElementById("totalResumo").innerText =
"Total: " + moeda(subtotal)

const selectBairro = document.getElementById("bairro")

Object.keys(CONFIG.bairros).forEach(chave=>{

const opt = document.createElement("option")

opt.value = chave
opt.innerText = CONFIG.bairros[chave]

selectBairro.appendChild(opt)

})

selectBairro.addEventListener("change",()=>{

const bairro = selectBairro.value
const taxa = calcularEntrega(bairro)

document.getElementById("taxaEntrega").innerText =
"Entrega: " + moeda(taxa)

document.getElementById("totalResumo").innerText =
"Total: " + moeda(subtotal + taxa)

})

document.getElementById("pagamento").addEventListener("change",()=>{

const forma = document.getElementById("pagamento").value
const areaTroco = document.getElementById("areaTroco")

if(forma === "dinheiro"){
areaTroco.style.display = "block"
}else{
areaTroco.style.display = "none"
}

})

const telefoneInput = document.getElementById("telefone")

telefoneInput.addEventListener("input",(e)=>{

let v = e.target.value.replace(/\D/g,'')

v = v.replace(/^(\d{2})(\d)/g,"($1) $2")
v = v.replace(/(\d{5})(\d)/,"$1-$2")

e.target.value = v

})

function confirmarEnvio(){

if(!validarCampos()) return

if(confirm("Confirmar envio do pedido?")){

enviarPedido()

}

}

function validarCampos(){

let ok = true

const nome = document.getElementById("nome")
const tel = document.getElementById("telefone")
const endereco = document.getElementById("endereco")
const bairro = document.getElementById("bairro")
const pagamento = document.getElementById("pagamento")

if(nome.value.trim()===""){
nome.classList.add("is-invalid")
ok=false
}else{
nome.classList.remove("is-invalid")
}

if(tel.value.replace(/\D/g,"").length < 10){
tel.classList.add("is-invalid")
ok=false
}else{
tel.classList.remove("is-invalid")
}

if(endereco.value.trim()===""){
endereco.classList.add("is-invalid")
ok=false
}else{
endereco.classList.remove("is-invalid")
}

if(bairro.value===""){
bairro.classList.add("is-invalid")
ok=false
}else{
bairro.classList.remove("is-invalid")
}

if(pagamento.value===""){
document.getElementById("erroPagamento").innerText="Selecione a forma de pagamento"
ok=false
}else{
document.getElementById("erroPagamento").innerText=""
}

return ok

}

function enviarPedido(){

document.getElementById("textoBotao").style.display="none"
document.getElementById("loader").style.display="inline-block"

const nome = document.getElementById("nome").value
let tel = document.getElementById("telefone").value.replace(/\D/g,"")

const endereco = document.getElementById("endereco").value
const bairro = document.getElementById("bairro").value
const pagamento = document.getElementById("pagamento").value
const obs = document.getElementById("obsFinal").value
const troco = document.getElementById("troco").value

const taxa = calcularEntrega(bairro)

let total = subtotal + taxa

let textoItens = ""

pedido.forEach(i=>{

textoItens += `${i.nome} x${i.qtd}\n`

})

let mensagem = `🍕 *NOVO PEDIDO*

👤 Cliente: ${nome}

📞 Telefone: ${tel}

📍 Endereço:
${endereco}
Bairro: ${CONFIG.bairros[bairro]}

🧾 Pedido:
${textoItens}

💳 Pagamento: ${pagamento}

💰 Troco: ${troco || "Não precisa"}

📝 Observação:
${obs}

🚚 Entrega: ${moeda(taxa)}

💰 Total: ${moeda(total)}
`

const url = `https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(mensagem)}`

setTimeout(()=>{

window.open(url)

},1200)

}

</script>

</body>
</html>
