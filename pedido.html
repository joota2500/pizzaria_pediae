<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Finalizar Pedido | PeçaPizzaOnline</title>

<meta name="description" content="Finalize seu pedido de pizza de forma rápida e segura.">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/pedido.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<main class="container py-5">

<div class="row justify-content-center">
<div class="col-lg-10">

<header class="text-center mb-4">

<h2 class="fw-bold">Finalizar Pedido</h2>

<a href="index.html#cardapio" class="voltarCardapio">
← Voltar ao cardápio
</a>

<div class="tempoEntrega mt-2">
<span class="badge bg-success fs-6">
🚚 Entrega estimada: 30–50 minutos
</span>
</div>

<p class="text-muted">
Entregamos apenas para os bairros listados
</p>

</header>

<div class="row g-4">

<!-- FORMULÁRIO -->

<section class="col-lg-7">

<div class="card shadow-sm">
<div class="card-body">

<h5 class="mb-3">📋 Dados do Cliente</h5>

<input type="text" id="nome" class="form-control mb-2" placeholder="👤 Seu nome">

<input type="tel" id="telefone" class="form-control mb-2" placeholder="📞 Telefone">

<input type="text" id="endereco" class="form-control mb-2" placeholder="📍 Endereço completo">

<select id="bairro" class="form-select mb-2">
<option value="">Selecione seu bairro</option>
</select>

<div class="input-group mt-3">
<input type="text" id="cupom" class="form-control" placeholder="🎟 Cupom de desconto">
<button class="btn btn-warning" onclick="aplicarCupom()">Aplicar</button>
</div>

<select id="pagamento" class="form-select mt-3">
<option value="">Forma de pagamento</option>
<option value="dinheiro">Dinheiro</option>
<option value="pix">Pix</option>
<option value="cartao">Cartão</option>
</select>

<div id="areaTroco" class="mt-2" style="display:none">
<input type="text" id="troco" class="form-control" placeholder="Troco para quanto?">
</div>

<textarea id="obsFinal" class="form-control mt-3" rows="3" placeholder="📝 Observação do pedido"></textarea>

<button class="btn btn-success w-100 mt-4 d-flex justify-content-center gap-2"
id="btnEnviar"
onclick="confirmarEnvio()">

<span id="textoBotao">FINALIZAR PEDIDO</span>
<span id="loader" class="spinner-border spinner-border-sm" style="display:none"></span>

</button>

</div>
</div>

</section>

<!-- RESUMO -->

<section class="col-lg-5">

<div class="card shadow-sm resumoPedido">
<div class="card-body">

<h5 class="mb-3">🍕 Seu Pedido</h5>

<div id="pizzaResumo"></div>
<div id="bebidaResumo"></div>

<hr>

<p id="subtotalResumo"></p>
<p id="cupomResumo"></p>
<p id="taxaEntrega">Entrega: R$ 0,00</p>

<hr>

<p class="fs-5 fw-bold text-danger" id="totalResumo"></p>

</div>
</div>

</section>

</div>
</div>
</div>

</main>

<footer class="text-center py-3">
<p>
©️ 2026 PeçaPizzaOnline -
<a href="https://github.com/joota2500" target="_blank">
DevJoota2500
</a>
</p>
</footer>


<!-- MODAL CONFIRMAÇÃO -->

<div class="modal fade" id="modalConfirmar">

<div class="modal-dialog modal-dialog-centered">

<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title">Confirmar Pedido</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
Deseja enviar seu pedido para a pizzaria?
</div>

<div class="modal-footer">
<button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
<button class="btn btn-success" onclick="enviarPedido()">Confirmar</button>
</div>

</div>
</div>
</div>



<script src="js/config.js"></script>
<script src="js/entrega.js"></script>
<script src="js/cupom.js"></script>
<script src="js/horario.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

const pedido = JSON.parse(localStorage.getItem("pedido")) || []

if(pedido.length === 0){
alert("Nenhum pedido encontrado")
window.location.href="index.html"
}

function moeda(v){
return Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"})
}

function sanitizar(texto){
return String(texto).replace(/</g,"&lt;").replace(/>/g,"&gt;")
}

let subtotal = 0
let taxaEntrega = 0

let pizzasHTML=[]
let bebidasHTML=[]


pedido.forEach(item=>{

const qtd = Number(item.qtd || 1)

subtotal += Number(item.preco) * qtd

if(item.tipo==="pizza"){

let nome = sanitizar(item.nome)

if(item.nome2){
nome = `${sanitizar(item.nome)} / ${sanitizar(item.nome2)}`
}

pizzasHTML.push(`
<div class="border rounded p-2 mb-2">
🍕 ${nome} (${item.tamanho})
<br>
Qtd: ${qtd}
<br>
${moeda(item.preco*qtd)}
</div>
`)
}

if(item.tipo==="bebida"){

bebidasHTML.push(`
<div class="border rounded p-2 mb-2">
🥤 ${sanitizar(item.nome)}
<br>
Qtd: ${qtd}
<br>
${moeda(item.preco*qtd)}
</div>
`)
}

})


document.getElementById("pizzaResumo").innerHTML=pizzasHTML.join("")
document.getElementById("bebidaResumo").innerHTML=bebidasHTML.join("")

document.getElementById("subtotalResumo").innerText="Subtotal: "+moeda(subtotal)



function atualizarTotal(){

const total = subtotal + taxaEntrega

document.getElementById("totalResumo").innerText="Total: "+moeda(total)

}

atualizarTotal()



// BAIRROS

const selectBairro=document.getElementById("bairro")

Object.keys(CONFIG.bairros).forEach(b=>{

const opt=document.createElement("option")
opt.value=b
opt.innerText=CONFIG.bairros[b]

selectBairro.appendChild(opt)

})


// FRETE

selectBairro.addEventListener("change",()=>{

const bairro=selectBairro.value

if(!bairro){
taxaEntrega=0
}else{
taxaEntrega = Number(calcularEntrega(bairro)) || 0
}

document.getElementById("taxaEntrega").innerText="Entrega: "+moeda(taxaEntrega)

if(typeof atualizarTotalComCupom === "function"){
atualizarTotalComCupom()
}else{
atualizarTotal()
}

})


// TROCO

document.getElementById("pagamento").addEventListener("change",()=>{

const forma=document.getElementById("pagamento").value

document.getElementById("areaTroco").style.display =
forma==="dinheiro" ? "block" : "none"

})



// ===============================
// VALIDAR CAMPOS
// ===============================

function validarCampos(){

const nome = document.getElementById("nome").value.trim()
const telefone = document.getElementById("telefone").value.trim()
const endereco = document.getElementById("endereco").value.trim()
const bairro = document.getElementById("bairro").value
const pagamento = document.getElementById("pagamento").value

if(!nome || !telefone || !endereco || !bairro || !pagamento){

alert("Preencha todos os campos obrigatórios.")

return false

}

return true

}



// CONFIRMAR

function confirmarEnvio(){

if(!validarCampos()) return

if(typeof verificarAntesDeEnviar === "function"){
if(!verificarAntesDeEnviar()) return
}

const modal=new bootstrap.Modal(document.getElementById("modalConfirmar"))
modal.show()

}



// ENVIAR PEDIDO

function enviarPedido(){

const botao=document.getElementById("btnEnviar")
const loader=document.getElementById("loader")
const texto=document.getElementById("textoBotao")

botao.disabled=true
texto.style.display="none"
loader.style.display="inline-block"

const nome=document.getElementById("nome").value
let tel=document.getElementById("telefone").value.replace(/\D/g,"")

const endereco=document.getElementById("endereco").value
const bairro=document.getElementById("bairro").value
const pagamento=document.getElementById("pagamento").value
const troco=document.getElementById("troco").value
const obs=document.getElementById("obsFinal").value

let itens=""

pedido.forEach(i=>{

let linha=`🍕 ${i.nome}`

if(i.nome2) linha+=` / ${i.nome2}`

if(i.tamanho) linha+=` (${i.tamanho})`

linha+=`\nQtd: ${i.qtd}`
linha+=`\nSubtotal: ${moeda(i.preco*i.qtd)}\n\n`

itens+=linha

})

const total = subtotal + taxaEntrega

let msg=`🍕 *NOVO PEDIDO*

👤 Cliente: ${nome}

📞 Telefone: ${tel}

📍 Endereço:
${endereco}
Bairro: ${CONFIG.bairros[bairro]}

🧾 Pedido:
${itens}

💳 Pagamento: ${pagamento}

💰 Troco Para: ${troco||"Não precisa"}

📝 Observação:
${obs}

🚚 Entrega: ${moeda(taxaEntrega)}

💰 Total: ${moeda(total)}
`

const url=`https://wa.me/${CONFIG.whatsapp}?text=${encodeURIComponent(msg)}`


setTimeout(()=>{

window.open(url)


// LIMPAR CARRINHO (ETAPA 5.6)

localStorage.removeItem("carrinho")
localStorage.removeItem("pedido")


loader.style.display="none"
texto.style.display="inline"
botao.disabled=false

},800)

}

</script>

</body>
</html>
